<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 90">
  <title>Carte Malédiction</title>
  <!-- Fond carte -->
  <rect width="60" height="90" rx="4" ry="4" fill="#1D3557"/>
  <!-- Bordure intérieure -->
  <rect x="3" y="3" width="54" height="84" rx="3" ry="3" fill="none" stroke="#A8DADC" stroke-width="1"/>
  <!-- Zone titre -->
  <rect x="5" y="5" width="50" height="14" rx="2" ry="2" fill="#F1FAEE" opacity="0.15"/>
  <text x="30" y="14.5" font-family="serif" font-size="6" font-weight="bold" fill="#A8DADC" text-anchor="middle">MALÉDICTION</text>
  <!-- Symbole central : crâne stylisé -->
  <!-- Crâne haut -->
  <ellipse cx="30" cy="42" rx="13" ry="12" fill="#F1FAEE" opacity="0.12"/>
  <ellipse cx="30" cy="40" rx="11" ry="10" fill="#2A2A4A"/>
  <ellipse cx="30" cy="38" rx="9" ry="8" fill="#A8DADC" opacity="0.85"/>
  <!-- Yeux crâne -->
  <ellipse cx="26" cy="36" rx="2.5" ry="2.5" fill="#1D3557"/>
  <ellipse cx="34" cy="36" rx="2.5" ry="2.5" fill="#1D3557"/>
  <!-- Nez crâne -->
  <path d="M29 40 L30 42 L31 40" fill="#1D3557"/>
  <!-- Mâchoire crâne -->
  <rect x="23" y="43" width="14" height="6" rx="1" fill="#A8DADC" opacity="0.85"/>
  <line x1="27" y1="43" x2="27" y2="49" stroke="#1D3557" stroke-width="1"/>
  <line x1="30" y1="43" x2="30" y2="49" stroke="#1D3557" stroke-width="1"/>
  <line x1="33" y1="43" x2="33" y2="49" stroke="#1D3557" stroke-width="1"/>
  <!-- Éclairs de malédiction -->
  <path d="M14 30 L18 38 L15 38 L20 48" stroke="#E9C46A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M46 30 L42 38 L45 38 L40 48" stroke="#E9C46A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Étoiles/particules magiques -->
  <circle cx="12" cy="25" r="1.2" fill="#E9C46A"/>
  <circle cx="48" cy="25" r="1.2" fill="#E9C46A"/>
  <circle cx="10" cy="55" r="1" fill="#E9C46A" opacity="0.7"/>
  <circle cx="50" cy="55" r="1" fill="#E9C46A" opacity="0.7"/>
  <circle cx="20" cy="20" r="0.8" fill="#A8DADC"/>
  <circle cx="40" cy="20" r="0.8" fill="#A8DADC"/>
  <!-- Spirales de malédiction -->
  <path d="M22 55 Q24 52 22 50 Q20 48 22 46" stroke="#E9C46A" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M38 55 Q36 52 38 50 Q40 48 38 46" stroke="#E9C46A" stroke-width="1" fill="none" opacity="0.7"/>
  <!-- Zone texte bas -->
  <rect x="5" y="63" width="50" height="22" rx="2" ry="2" fill="#F1FAEE" opacity="0.1"/>
  <text x="30" y="72" font-family="serif" font-size="5" fill="#F1FAEE" text-anchor="middle">Perdez 2 PV.</text>
  <text x="30" y="79" font-family="serif" font-size="4.5" fill="#A8DADC" text-anchor="middle">Passez votre</text>
  <text x="30" y="84.5" font-family="serif" font-size="4.5" fill="#A8DADC" text-anchor="middle">prochain tour.</text>
</svg>