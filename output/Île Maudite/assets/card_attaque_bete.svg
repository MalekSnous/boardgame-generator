<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 90">
  <title>Carte Événement - Attaque de Bête</title>
  <!-- Card background -->
  <rect width="60" height="90" rx="5" ry="5" fill="#F1FAEE" stroke="#1D3557" stroke-width="2"/>
  <!-- Header band -->
  <rect x="2" y="2" width="56" height="18" rx="4" ry="4" fill="#1D3557"/>
  <!-- Header text: ÉVÉNEMENT -->
  <text x="30" y="8" font-family="serif" font-size="4.5" fill="#A8DADC" text-anchor="middle" font-weight="bold">ÉVÉNEMENT</text>
  <!-- Card type text -->
  <text x="30" y="16" font-family="serif" font-size="5" fill="#F4A261" text-anchor="middle" font-weight="bold">Attaque de Bête</text>
  <!-- Illustration area -->
  <rect x="6" y="23" width="48" height="36" rx="3" ry="3" fill="#A8DADC" stroke="#1D3557" stroke-width="1.2"/>
  <!-- Beast body (wolf-like silhouette) -->
  <!-- Body -->
  <ellipse cx="30" cy="45" rx="12" ry="8" fill="#1D3557"/>
  <!-- Head -->
  <ellipse cx="40" cy="37" rx="7" ry="6" fill="#1D3557"/>
  <!-- Ears -->
  <polygon points="36,32 34,26 39,31" fill="#1D3557"/>
  <polygon points="43,31 45,25 47,32" fill="#1D3557"/>
  <!-- Snout -->
  <ellipse cx="46" cy="39" rx="3.5" ry="2.5" fill="#E63946"/>
  <!-- Eye -->
  <circle cx="42" cy="36" r="1.5" fill="#F4A261"/>
  <circle cx="42" cy="36" r="0.7" fill="#1D3557"/>
  <!-- Mouth / fang -->
  <line x1="44" y1="41" x2="47" y2="43" stroke="#F1FAEE" stroke-width="1" stroke-linecap="round"/>
  <polygon points="46,41 49,42 47,44" fill="white"/>
  <!-- Tail -->
  <path d="M18,44 Q10,38 12,32 Q14,28 17,33" fill="none" stroke="#1D3557" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="23" y1="51" x2="21" y2="58" stroke="#1D3557" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="52" x2="27" y2="59" stroke="#1D3557" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="52" x2="34" y2="59" stroke="#1D3557" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="51" x2="40" y2="58" stroke="#1D3557" stroke-width="3" stroke-linecap="round"/>
  <!-- Claws left -->
  <line x1="21" y1="58" x2="19" y2="60" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="58" x2="22" y2="60" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Claws right -->
  <line x1="40" y1="58" x2="38" y2="60" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="58" x2="41" y2="60" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Scratch marks on illustration -->
  <line x1="12" y1="28" x2="18" y2="38" stroke="#E63946" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="15" y1="27" x2="21" y2="37" stroke="#E63946" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Divider -->
  <line x1="6" y1="63" x2="54" y2="63" stroke="#1D3557" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Effect icon: damage symbol -->
  <circle cx="14" cy="71" r="5" fill="#E63946" stroke="#1D3557" stroke-width="1"/>
  <text x="14" y="74" font-family="serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">!</text>
  <!-- Effect text -->
  <text x="21" y="69" font-family="serif" font-size="4.2" fill="#1D3557" font-weight="bold">Chaque joueur</text>
  <text x="21" y="75" font-family="serif" font-size="4.2" fill="#1D3557">sur cette case</text>
  <!-- PV loss indicator -->
  <text x="6" y="85" font-family="serif" font-size="4" fill="#E63946" font-weight="bold">-2 PV</text>
  <text x="28" y="85" font-family="serif" font-size="3.5" fill="#1D3557">Chasseur : annule</text>
  <!-- Count badge -->
  <circle cx="52" cy="86" r="5" fill="#1D3557"/>
  <text x="52" y="89" font-family="serif" font-size="6" fill="#F4A261" text-anchor="middle" font-weight="bold">×</text>
  <text x="52" y="86.5" font-family="serif" font-size="5" fill="#F4A261" text-anchor="middle" font-weight="bold">12</text>
</svg>