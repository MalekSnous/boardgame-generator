<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 90">
  <title>Carte Événement — Tempête</title>
  <!-- Fond carte -->
  <rect width="60" height="90" rx="4" ry="4" fill="#F1FAEE" stroke="#1D3557" stroke-width="1.5"/>
  <!-- En-tête -->
  <rect x="0" y="0" width="60" height="18" rx="4" ry="4" fill="#1D3557"/>
  <rect x="0" y="10" width="60" height="8" fill="#1D3557"/>
  <text x="30" y="13" font-family="serif" font-size="7" font-weight="bold" fill="#F1FAEE" text-anchor="middle">ÉVÉNEMENT</text>
  <!-- Zone illustration -->
  <rect x="4" y="21" width="52" height="36" rx="3" ry="3" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <!-- Nuages de tempête -->
  <ellipse cx="18" cy="33" rx="9" ry="6" fill="#1D3557" opacity="0.75"/>
  <ellipse cx="27" cy="30" rx="10" ry="7" fill="#1D3557" opacity="0.8"/>
  <ellipse cx="38" cy="33" rx="8" ry="5.5" fill="#1D3557" opacity="0.75"/>
  <ellipse cx="22" cy="36" rx="7" ry="5" fill="#1D3557" opacity="0.7"/>
  <ellipse cx="34" cy="36" rx="7" ry="5" fill="#1D3557" opacity="0.7"/>
  <!-- Éclairs -->
  <polyline points="24,37 21,45 25,45 22,54" fill="none" stroke="#E9C46A" stroke-width="2" stroke-linejoin="round"/>
  <polyline points="35,37 32,45 36,45 33,53" fill="none" stroke="#E9C46A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Pluie -->
  <line x1="10" y1="43" x2="8" y2="50" stroke="#457B9D" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="45" x2="12" y2="52" stroke="#457B9D" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="44" y1="43" x2="42" y2="50" stroke="#457B9D" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="45" x2="46" y2="52" stroke="#457B9D" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Nom carte -->
  <text x="30" y="67" font-family="serif" font-size="8.5" font-weight="bold" fill="#1D3557" text-anchor="middle">Tempête</text>
  <!-- Séparateur -->
  <line x1="8" y1="70" x2="52" y2="70" stroke="#1D3557" stroke-width="0.8"/>
  <!-- Texte effet -->
  <text x="30" y="78" font-family="sans-serif" font-size="5" fill="#1D3557" text-anchor="middle">Cases adjacentes bloquées</text>
  <text x="30" y="85" font-family="sans-serif" font-size="5" fill="#1D3557" text-anchor="middle">pendant 1 tour.</text>
</svg>