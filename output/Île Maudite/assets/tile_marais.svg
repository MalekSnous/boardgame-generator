<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <title>Tuile Marais</title>
  <rect width="60" height="60" rx="4" ry="4" fill="#1D3557" />
  <rect x="2" y="2" width="56" height="56" rx="3" ry="3" fill="#2D5A3D" />
  <!-- Eau sombre du marais -->
  <ellipse cx="30" cy="38" rx="22" ry="10" fill="#1a3a2a" />
  <ellipse cx="18" cy="42" rx="10" ry="5" fill="#163020" />
  <ellipse cx="42" cy="40" rx="9" ry="4" fill="#163020" />
  <!-- Reflets eau -->
  <ellipse cx="24" cy="39" rx="5" ry="1.5" fill="#A8DADC" opacity="0.25" />
  <ellipse cx="38" cy="41" rx="4" ry="1.2" fill="#A8DADC" opacity="0.2" />
  <!-- Herbes / roseaux gauche -->
  <line x1="12" y1="44" x2="10" y2="28" stroke="#4a7a40" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="28" x2="8" y2="24" stroke="#4a7a40" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="8" cy="23" rx="2" ry="4" fill="#5a8a30" />
  <line x1="14" y1="43" x2="13" y2="30" stroke="#3d6e35" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="12.5" cy="28" rx="1.5" ry="3.5" fill="#4a7a2a" />
  <!-- Herbes / roseaux droite -->
  <line x1="48" y1="44" x2="50" y2="28" stroke="#4a7a40" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="28" x2="52" y2="24" stroke="#4a7a40" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="52" cy="23" rx="2" ry="4" fill="#5a8a30" />
  <line x1="46" y1="43" x2="47" y2="30" stroke="#3d6e35" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="47.5" cy="28" rx="1.5" ry="3.5" fill="#4a7a2a" />
  <!-- Roseaux centre -->
  <line x1="30" y1="43" x2="29" y2="25" stroke="#4a7a40" stroke-width="1.4" stroke-linecap="round"/>
  <ellipse cx="29" cy="23" rx="1.8" ry="4" fill="#5a8a30" />
  <line x1="34" y1="43" x2="35" y2="27" stroke="#3d6e35" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="35.5" cy="25" rx="1.5" ry="3.5" fill="#4a7a2a" />
  <!-- Icône avertissement piège -1 PV -->
  <polygon points="30,5 36,16 24,16" fill="#E63946" stroke="#F1FAEE" stroke-width="1" stroke-linejoin="round"/>
  <text x="30" y="14.5" font-family="serif" font-size="7" font-weight="bold" fill="#F1FAEE" text-anchor="middle">!</text>
  <!-- Label -->
  <rect x="8" y="48" width="44" height="9" rx="2" fill="#1D3557" opacity="0.75"/>
  <text x="30" y="55.5" font-family="sans-serif" font-size="6.5" font-weight="bold" fill="#A8DADC" text-anchor="middle">MARAIS</text>
</svg>