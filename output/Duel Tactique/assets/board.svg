<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <title>Duel Tactique - Plateau de jeu</title>
  <defs>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="none" stroke="#1D3557" stroke-width="0.8"/>
    </pattern>
    <pattern id="checkerboard" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#F1FAEE"/>
      <rect x="50" y="0" width="50" height="50" fill="#E2F0EE"/>
      <rect x="0" y="50" width="50" height="50" fill="#E2F0EE"/>
    </pattern>
  </defs>

  <!-- Fond général -->
  <rect width="500" height="500" fill="#1D3557"/>

  <!-- Titre -->
  <text x="250" y="22" font-family="serif" font-size="16" font-weight="bold" fill="#F1FAEE" text-anchor="middle" letter-spacing="2">DUEL TACTIQUE</text>

  <!-- Zone plateau 8x8 -->
  <g transform="translate(50, 35)">

    <!-- Fond du plateau -->
    <rect width="400" height="400" fill="#F1FAEE" rx="2"/>

    <!-- Cases alternées -->
    <!-- Rangée 0 -->
    <rect x="0"   y="0"   width="50" height="50" fill="#D8EDE8"/>
    <rect x="100" y="0"   width="50" height="50" fill="#D8EDE8"/>
    <rect x="200" y="0"   width="50" height="50" fill="#D8EDE8"/>
    <rect x="300" y="0"   width="50" height="50" fill="#D8EDE8"/>
    <!-- Rangée 0 pair -->
    <rect x="50"  y="0"   width="50" height="50" fill="#F1FAEE"/>
    <rect x="150" y="0"   width="50" height="50" fill="#F1FAEE"/>
    <rect x="250" y="0"   width="50" height="50" fill="#F1FAEE"/>
    <rect x="350" y="0"   width="50" height="50" fill="#F1FAEE"/>

    <!-- Rangée 1 -->
    <rect x="0"   y="50"  width="50" height="50" fill="#F1FAEE"/>
    <rect x="100" y="50"  width="50" height="50" fill="#F1FAEE"/>
    <rect x="200" y="50"  width="50" height="50" fill="#F1FAEE"/>
    <rect x="300" y="50"  width="50" height="50" fill="#F1FAEE"/>
    <rect x="50"  y="50"  width="50" height="50" fill="#D8EDE8"/>
    <rect x="150" y="50"  width="50" height="50" fill="#D8EDE8"/>
    <rect x="250" y="50"  width="50" height="50" fill="#D8EDE8"/>
    <rect x="350" y="50"  width="50" height="50" fill="#D8EDE8"/>

    <!-- Rangée 2 -->
    <rect x="0"   y="100" width="50" height="50" fill="#D8EDE8"/>
    <rect x="100" y="100" width="50" height="50" fill="#D8EDE8"/>
    <rect x="200" y="100" width="50" height="50" fill="#D8EDE8"/>
    <rect x="300" y="100" width="50" height="50" fill="#D8EDE8"/>
    <rect x="50"  y="100" width="50" height="50" fill="#F1FAEE"/>
    <rect x="150" y="100" width="50" height="50" fill="#F1FAEE"/>
    <rect x="250" y="100" width="50" height="50" fill="#F1FAEE"/>
    <rect x="350" y="100" width="50" height="50" fill="#F1FAEE"/>

    <!-- Rangée 3 -->
    <rect x="0"   y="150" width="50" height="50" fill="#F1FAEE"/>
    <rect x="100" y="150" width="50" height="50" fill="#F1FAEE"/>
    <rect x="200" y="150" width="50" height="50" fill="#F1FAEE"/>
    <rect x="300" y="150" width="50" height="50" fill="#F1FAEE"/>
    <rect x="50"  y="150" width="50" height="50" fill="#D8EDE8"/>
    <rect x="150" y="150" width="50" height="50" fill="#D8EDE8"/>
    <rect x="250" y="150" width="50" height="50" fill="#D8EDE8"/>
    <rect x="350" y="150" width="50" height="50" fill="#D8EDE8"/>

    <!-- Rangée 4 -->
    <rect x="0"   y="200" width="50" height="50" fill="#D8EDE8"/>
    <rect x="100" y="200" width="50" height="50" fill="#D8EDE8"/>
    <rect x="200" y="200" width="50" height="50" fill="#D8EDE8"/>
    <rect x="300" y="200" width="50" height="50" fill="#D8EDE8"/>
    <rect x="50"  y="200" width="50" height="50" fill="#F1FAEE"/>
    <rect x="150" y="200" width="50" height="50" fill="#F1FAEE"/>
    <rect x="250" y="200" width="50" height="50" fill="#F1FAEE"/>
    <rect x="350" y="200" width="50" height="50" fill="#F1FAEE"/>

    <!-- Rangée 5 -->
    <rect x="0"   y="250" width="50" height="50" fill="#F1FAEE"/>
    <rect x="100" y="250" width="50" height="50" fill="#F1FAEE"/>
    <rect x="200" y="250" width="50" height="50" fill="#F1FAEE"/>
    <rect x="300" y="250" width="50" height="50" fill="#F1FAEE"/>
    <rect x="50"  y="250" width="50" height="50" fill="#D8EDE8"/>
    <rect x="150" y="250" width="50" height="50" fill="#D8EDE8"/>
    <rect x="250" y="250" width="50" height="50" fill="#D8EDE8"/>
    <rect x="350" y="250" width="50" height="50" fill="#D8EDE8"/>

    <!-- Rangée 6 -->
    <rect x="0"   y="300" width="50" height="50" fill="#D8EDE8"/>
    <rect x="100" y="300" width="50" height="50" fill="#D8EDE8"/>
    <rect x="200" y="300" width="50" height="50" fill="#D8EDE8"/>
    <rect x="300" y="300" width="50" height="50" fill="#D8EDE8"/>
    <rect x="50"  y="300" width="50" height="50" fill="#F1FAEE"/>
    <rect x="150" y="300" width="50" height="50" fill="#F1FAEE"/>
    <rect x="250" y="300" width="50" height="50" fill="#F1FAEE"/>
    <rect x="350" y="300" width="50" height="50" fill="#F1FAEE"/>

    <!-- Rangée 7 -->
    <rect x="0"   y="350" width="50" height="50" fill="#F1FAEE"/>
    <rect x="100" y="350" width="50" height="50" fill="#F1FAEE"/>
    <rect x="200" y="350" width="50" height="50" fill="#F1FAEE"/>
    <rect x="300" y="350" width="50" height="50" fill="#F1FAEE"/>
    <rect x="50"  y="350" width="50" height="50" fill="#D8EDE8"/>
    <rect x="150" y="350" width="50" height="50" fill="#D8EDE8"/>
    <rect x="250" y="350" width="50" height="50" fill="#D8EDE8"/>
    <rect x="350" y="350" width="50" height="50" fill="#D8EDE8"/>

    <!-- Grille -->
    <line x1="0"   y1="0"   x2="0"   y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="50"  y1="0"   x2="50"  y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="100" y1="0"   x2="100" y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="150" y1="0"   x2="150" y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="200" y1="0"   x2="200" y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="250" y1="0"   x2="250" y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="300" y1="0"   x2="300" y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="350" y1="0"   x2="350" y2="400" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="400" y1="0"   x2="400" y2="400" stroke="#1D3557" stroke-width="0.8"/>

    <line x1="0" y1="0"   x2="400" y2="0"   stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="50"  x2="400" y2="50"  stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="350" x2="400" y2="350" stroke="#1D3557" stroke-width="0.8"/>
    <line x1="0" y1="400" x2="400" y2="400" stroke="#1D3557" stroke-width="0.8"/>

    <!-- Bordure épaisse du plateau -->
    <rect width="400" height="400" fill="none" stroke="#1D3557" stroke-width="3" rx="1"/>

    <!-- Zone Joueur 1 (rangées 0-1, fond rouge teinté) -->
    <rect x="0" y="0" width="400" height="100" fill="#E63946" fill-opacity="0.12" pointer-events="none"/>
    <!-- Zone Joueur 2 (rangées 6-7, fond bleu teinté) -->
    <rect x="0" y="300" width="400" height="100" fill="#457B9D" fill-opacity="0.12" pointer-events="none"/>

    <!-- Indicateurs de zone -->
    <text x="4" y="14" font-family="sans-serif" font-size="10" fill="#E63946" font-weight="bold">J1</text>
    <text x="4" y="390" font-family="sans-serif" font-size="10" fill="#457B9D" font-weight="bold">J2</text>

    <!-- Colonnes labels (A-H) -->
    <text x="21"  y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">A</text>
    <text x="71"  y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">B</text>
    <text x="121" y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">C</text>
    <text x="171" y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">D</text>
    <text x="221" y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">E</text>
    <text x="271" y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">F</text>
    <text x="321" y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">G</text>
    <text x="371" y="414" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">H</text>

    <!-- Lignes labels (1-8) -->
    <text x="-14" y="29"  font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">1</text>
    <text x="-14" y="79"  font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">2</text>
    <text x="-14" y="129" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">3</text>
    <text x="-14" y="179" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">4</text>
    <text x="-14" y="229" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">5</text>
    <text x="-14" y="279" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">6</text>
    <text x="-14" y="329" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">7</text>
    <text x="-14" y="379" font-family="sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">8</text>

    <!-- ===== PIÈCES JOUEUR 1 (rouge, rangées 0-1) ===== -->