<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 620">
<title>Duel Tactique - Plateau de jeu</title>
<defs>
  <pattern id="checkLight" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <rect width="50" height="50" fill="#F1FAEE"/>
  </pattern>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1D3557" flood-opacity="0.3"/>
  </filter>
</defs>

<!-- Fond général -->
<rect width="500" height="620" fill="#1D3557" rx="8"/>

<!-- Bandeau joueur actif -->
<rect x="10" y="10" width="480" height="36" rx="6" fill="#E63946" id="turnBanner"/>
<text x="250" y="33" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#F1FAEE">TOUR DU JOUEUR 1 (ROUGE)</text>

<!-- Zone infos joueur 1 (rouge) -->
<rect x="10" y="54" width="230" height="44" rx="5" fill="#1D3557" stroke="#E63946" stroke-width="2"/>
<text x="20" y="70" font-family="serif" font-size="12" fill="#E63946" font-weight="bold">JOUEUR 1</text>
<text x="20" y="88" font-family="serif" font-size="11" fill="#F1FAEE">Points d'Action :</text>
<!-- PA joueur 1 : 3 cercles -->
<circle cx="145" cy="83" r="7" fill="#E63946" stroke="#F1FAEE" stroke-width="1.5"/>
<text x="145" y="87" text-anchor="middle" font-family="serif" font-size="9" fill="#F1FAEE">1</text>
<circle cx="163" cy="83" r="7" fill="#E63946" stroke="#F1FAEE" stroke-width="1.5"/>
<text x="163" y="87" text-anchor="middle" font-family="serif" font-size="9" fill="#F1FAEE">2</text>
<circle cx="181" cy="83" r="7" fill="#E63946" stroke="#F1FAEE" stroke-width="1.5"/>
<text x="181" y="87" text-anchor="middle" font-family="serif" font-size="9" fill="#F1FAEE">3</text>
<rect cx="200" cy="83" x="196" y="74" width="34" height="18" rx="4" fill="#A8DADC" opacity="0.3"/>
<text x="213" y="87" text-anchor="middle" font-family="serif" font-size="10" fill="#A8DADC">PA: 3</text>

<!-- Zone infos joueur 2 (bleu) -->
<rect x="260" y="54" width="230" height="44" rx="5" fill="#1D3557" stroke="#457B9D" stroke-width="2"/>
<text x="270" y="70" font-family="serif" font-size="12" fill="#457B9D" font-weight="bold">JOUEUR 2</text>
<text x="270" y="88" font-family="serif" font-size="11" fill="#F1FAEE">Points d'Action :</text>
<!-- PA joueur 2 : 3 cercles -->
<circle cx="395" cy="83" r="7" fill="#457B9D" stroke="#F1FAEE" stroke-width="1.5"/>
<text x="395" y="87" text-anchor="middle" font-family="serif" font-size="9" fill="#F1FAEE">1</text>
<circle cx="413" cy="83" r="7" fill="#457B9D" stroke="#F1FAEE" stroke-width="1.5"/>
<text x="413" y="87" text-anchor="middle" font-family="serif" font-size="9" fill="#F1FAEE">2</text>
<circle cx="431" cy="83" r="7" fill="#457B9D" stroke="#F1FAEE" stroke-width="1.5"/>
<text x="431" y="87" text-anchor="middle" font-family="serif" font-size="9" fill="#F1FAEE">3</text>
<rect x="446" y="74" width="34" height="18" rx="4" fill="#A8DADC" opacity="0.3"/>
<text x="463" y="87" text-anchor="middle" font-family="serif" font-size="10" fill="#A8DADC">PA: 3</text>

