<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 90">
  <title>Carte Action - Bouclier</title>
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1FAEE"/>
      <stop offset="100%" stop-color="#A8DADC"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8DADC"/>
      <stop offset="100%" stop-color="#457B9D"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="1" y="1" width="58" height="88" rx="5" ry="5" fill="url(#cardGrad)" stroke="#1D3557" stroke-width="1.5"/>

  <!-- Header band -->
  <rect x="1" y="1" width="58" height="16" rx="5" ry="5" fill="#457B9D"/>
  <rect x="1" y="9" width="58" height="8" fill="#457B9D"/>

  <!-- Title -->
  <text x="30" y="13" font-family="serif" font-size="7" font-weight="bold" fill="#F1FAEE" text-anchor="middle" letter-spacing="0.5">BOUCLIER</text>

  <!-- Shield shape -->
  <path d="M30 24 L44 30 L44 46 Q44 56 30 62 Q16 56 16 46 L16 30 Z" fill="url(#shieldGrad)" stroke="#1D3557" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Shield inner highlight -->
  <path d="M30 27 L41 32 L41 46 Q41 53.5 30 58.5 Q19 53.5 19 46 L19 32 Z" fill="none" stroke="#F1FAEE" stroke-width="1" stroke-linejoin="round" opacity="0.5"/>

  <!-- Shield cross emblem -->
  <line x1="30" y1="34" x2="30" y2="52" stroke="#F1FAEE" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="41" x2="37" y2="41" stroke="#F1FAEE" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Accent dot top of shield -->
  <circle cx="30" cy="24" r="2.5" fill="#F4A261" stroke="#1D3557" stroke-width="1"/>

  <!-- Footer band -->
  <rect x="1" y="75" width="58" height="14" rx="0" ry="0" fill="#1D3557"/>
  <rect x="1" y="81" width="58" height="8" rx="5" ry="5" fill="#1D3557"/>

  <!-- Card effect text -->
  <text x="30" y="72" font-family="serif" font-size="5.5" fill="#1D3557" text-anchor="middle" font-style="italic">+1 défense ce tour</text>

  <!-- Value badge -->
  <circle cx="30" cy="82" r="5" fill="#F4A261" stroke="#F1FAEE" stroke-width="1"/>
  <text x="30" y="85" font-family="serif" font-size="6" font-weight="bold" fill="#1D3557" text-anchor="middle">D</text>
</svg>