<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <title>Pièce Soldat - Duel Tactique</title>
  <circle cx="30" cy="30" r="27" fill="#E63946" stroke="#1D3557" stroke-width="2.5"/>
  <circle cx="30" cy="30" r="22" fill="none" stroke="#1D3557" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Corps du soldat -->
  <rect x="23" y="30" width="14" height="12" rx="2" fill="#1D3557"/>
  <!-- Tête -->
  <circle cx="30" cy="24" r="6" fill="#F1FAEE" stroke="#1D3557" stroke-width="1.5"/>
