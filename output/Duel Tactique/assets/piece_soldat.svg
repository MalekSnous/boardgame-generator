  <path d="M24 23 Q24 17 30 17 Q36 17 36 23 Z" fill="#1D3557"/>
  <rect x="23" y="23" width="14" height="2" rx="1" fill="#1D3557"/>
  <!-- Bouclier -->
  <path d="M18 30 Q18 27 20 26 L20 35 Q18 34 18 30 Z" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <!-- Lance -->
  <line x1="40" y1="20" x2="40" y2="42" stroke="#1D3557" stroke-width="2" stroke-linecap="round"/>
  <polygon points="40,16 38,22 42,22" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <!-- Valeur de combat -->
  <circle cx="30" cy="50" r="6" fill="#F4A261" stroke="#1D3557" stroke-width="1.5"/>
  <text x="30" y="54" font-family="serif" font-size="8" font-weight="bold" fill="#1D3557" text-anchor="middle">1</text>
