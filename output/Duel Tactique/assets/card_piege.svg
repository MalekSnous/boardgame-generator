<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 90">
  <title>Carte Piège</title>
  <!-- Card background -->
  <rect width="60" height="90" rx="5" ry="5" fill="#F1FAEE" stroke="#1D3557" stroke-width="2"/>
  <!-- Header band -->
  <rect x="2" y="2" width="56" height="18" rx="4" ry="4" fill="#1D3557"/>
  <!-- Title text -->
  <text x="30" y="14" font-family="serif" font-size="8" font-weight="bold" fill="#F1FAEE" text-anchor="middle">PIÈGE</text>
  <!-- Card art area -->
  <rect x="5" y="23" width="50" height="42" rx="3" ry="3" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <!-- Trap jaw left -->
  <path d="M12 52 L18 36 L22 52 Z" fill="#1D3557"/>
  <!-- Trap jaw right -->
  <path d="M48 52 L42 36 L38 52 Z" fill="#1D3557"/>
  <!-- Trap base -->
  <rect x="10" y="51" width="40" height="5" rx="2" fill="#1D3557"/>
  <!-- Trap teeth left -->
  <polygon points="12,51 14,44 16,51" fill="#E63946"/>
  <polygon points="16,51 18,44 20,51" fill="#E63946"/>
  <polygon points="20,51 22,44 24,51" fill="#E63946"/>
  <!-- Trap teeth right -->
  <polygon points="36,51 38,44 40,51" fill="#E63946"/>
  <polygon points="40,51 42,44 44,51" fill="#E63946"/>
  <polygon points="44,51 46,44 48,51" fill="#E63946"/>
  <!-- Spring coil -->
  <ellipse cx="30" cy="48" rx="4" ry="3" fill="none" stroke="#F4A261" stroke-width="2"/>
  <line x1="30" y1="45" x2="30" y2="36" stroke="#F4A261" stroke-width="2"/>
  <!-- Trigger line -->
  <line x1="24" y1="42" x2="36" y2="42" stroke="#F4A261" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- Alert symbol -->
  <text x="30" y="34" font-family="serif" font-size="11" font-weight="bold" fill="#E63946" text-anchor="middle">!</text>
  <!-- Effect text area -->
  <rect x="5" y="68" width="50" height="18" rx="3" ry="3" fill="#1D3557"/>
  <text x="30" y="77" font-family="serif" font-size="5.5" fill="#F1FAEE" text-anchor="middle">Immobilise une pièce</text>
  <text x="30" y="84" font-family="serif" font-size="5.5" fill="#A8DADC" text-anchor="middle">ennemie 1 tour</text>
</svg>