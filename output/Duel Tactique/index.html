<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duel Tactique</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Écran de fin de partie -->
  <div id="gameover-screen" class="hidden">
    <div id="gameover-content">
      <h1 id="gameover-title">Partie terminée</h1>
      <p id="gameover-msg"></p>
      <button id="btn-new-game-over">Nouvelle partie</button>
    </div>
  </div>

  <!-- Conteneur principal -->
  <div id="game-board">

    <!-- Plateau de jeu -->
    <div id="board-section">
      <div id="board-wrapper">
        <div id="board-grid">
          <!-- Cases générées dynamiquement par game.js -->
        </div>
      </div>

      <!-- Message d'aide contextuel -->
      <div id="context-message"></div>

      <!-- Boutons d'action principaux sous le plateau -->
      <div id="action-buttons">
        <button id="btn-draw-card">🃏 Piocher une carte</button>
        <button id="btn-end-turn">⏭ Fin de tour</button>
        <button id="btn-new-game">🔄 Nouvelle partie</button>
        <button id="fog-toggle">👁 Brouillard</button>
      </div>
    </div>

    <!-- Panneau latéral d'informations -->
    <div id="info-panel">

      <!-- Joueur actif -->
      <div id="active-player-section">
        <div id="active-player-avatar"></div>
        <div id="active-player-name">Joueur 1</div>
        <div id="phase-label">🎯 Sélectionner une pièce</div>
      </div>

      <!-- Liste des joueurs avec PV -->
      <div id="players-section">
        <h3>Joueurs</h3>
        <ul id="players-list">
          <!-- Généré par game.js -->
        </ul>
      </div>

      <!-- Barre de progression des tours -->
      <div id="turn-section">
        <h3>Tours</h3>
        <div id="turn-bar">
          <div id="turn-bar-fill"></div>
        </div>
        <div id="turn-count"></div>
      </div>

      <!-- Dernier événement -->
      <div id="last-event-section">
        <h3>Événement</h3>
        <div id="last-event-box">—</div>
      </div>

      <!-- Main du joueur actif -->
      <div id="hand-section">
        <h3>Main</h3>
        <div id="hand-cards">
          <!-- Cartes générées par game.js -->
        </div>
      </div>

      <!-- Inventaire / emplacements -->
      <div id="inventory-section">
        <h3>Inventaire</h3>
        <div id="inventory-slots">
          <div class="inventory-slot" data-slot="0"></div>
          <div class="inventory-slot" data-slot="1"></div>
          <div class="inventory-slot" data-slot="2"></div>
          <div class="inventory-slot" data-slot="3"></div>
          <div class="inventory-slot" data-slot="4"></div>
          <div class="inventory-slot" data-slot="5"></div>
          <div class="inventory-slot" data-slot="6"></div>
          <div class="inventory-slot" data-slot="7"></div>
        </div>
      </div>

      <!-- Journal des actions -->
      <div id="log-section">
        <h3>Journal</h3>
        <ul id="log-list">
          <!-- Généré par game.js -->
        </ul>
      </div>

    </div>
    <!-- fin #info-panel -->

  </div>
  <!-- fin #game-board -->

  <script src="game.js"></script>
</body>
</html>
