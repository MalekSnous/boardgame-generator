<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <title>Dés du Destin – Plateau Principal</title>
  <!-- Fond général -->
  <rect width="500" height="500" fill="#F1FAEE"/>
  <!-- Bordure extérieure -->
  <rect x="4" y="4" width="492" height="492" rx="12" ry="12" fill="none" stroke="#1D3557" stroke-width="3"/>

  <!-- Titre -->
  <rect x="120" y="10" width="260" height="32" rx="6" fill="#1D3557"/>
  <text x="250" y="31" font-family="serif" font-size="16" font-weight="bold" fill="#F1FAEE" text-anchor="middle">DÉS DU DESTIN</text>

  <!-- ===================== JAUGE DE CRISE ===================== -->
  <rect x="20" y="52" width="460" height="60" rx="8" fill="#A8DADC" stroke="#1D3557" stroke-width="2"/>
  <text x="250" y="70" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1D3557" text-anchor="middle">JAUGE DE CRISE</text>

  <!-- Graduation 0–10 -->
  <!-- Fond dégradé simulé par rectangles -->
  <rect x="30" y="74" width="440" height="28" rx="5" fill="#F1FAEE" stroke="#1D3557" stroke-width="1.5"/>
  <!-- Segments colorés de la jauge -->
  <rect x="30" y="74" width="132" height="28" rx="5" fill="#2A9D8F" opacity="0.4"/>
  <rect x="162" y="74" width="132" height="28" fill="#E9C46A" opacity="0.4"/>
  <rect x="294" y="74" width="132" height="28" rx="5" fill="#E63946" opacity="0.4"/>
  <!-- Séparateurs et labels -->
  <line x1="74" y1="74" x2="74" y2="102" stroke="#1D3557" stroke-width="1"/>
  <line x1="118" y1="74" x2="118" y2="102" stroke="#1D3557" stroke-width="1"/>
  <line x1="162" y1="74" x2="162" y2="102" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="206" y1="74" x2="206" y2="102" stroke="#1D3557" stroke-width="1"/>
  <line x1="250" y1="74" x2="250" y2="102" stroke="#1D3557" stroke-width="1"/>
  <line x1="294" y1="74" x2="294" y2="102" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="338" y1="74" x2="338" y2="102" stroke="#1D3557" stroke-width="1"/>
  <line x1="382" y1="74" x2="382" y2="102" stroke="#1D3557" stroke-width="1"/>
  <line x1="426" y1="74" x2="426" y2="102" stroke="#1D3557" stroke-width="1"/>

  <text x="30" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">0</text>
  <text x="74" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">1</text>
  <text x="118" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">2</text>
  <text x="162" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">3</text>
  <text x="206" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">4</text>
  <text x="250" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">5</text>
  <text x="294" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">6</text>
  <text x="338" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">7</text>
  <text x="382" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">8</text>
  <text x="426" y="100" font-family="sans-serif" font-size="9" fill="#1D3557" text-anchor="middle">9</text>
  <text x="470" y="100" font-family="sans-serif" font-size="9" fill="#E63946" font-weight="bold" text-anchor="middle">10</text>
  <!-- Curseur pion (position 0) -->
  <polygon points="30,72 38,64 22,64" fill="#F4A261" stroke="#1D3557" stroke-width="1.5"/>

  <!-- Étiquettes zones -->
  <text x="96" y="71" font-family="sans-serif" font-size="8" fill="#2A9D8F" font-weight="bold" text-anchor="middle">CALME</text>
  <text x="228" y="71" font-family="sans-serif" font-size="8" fill="#E9C46A" font-weight="bold" text-anchor="middle">TENSION</text>
  <text x="360" y="71" font-family="sans-serif" font-size="8" fill="#E63946" font-weight="bold" text-anchor="middle">CATASTROPHE</text>

  <!-- ===================== ZONE CENTRALE – AIRE DE JEU ===================== -->
  <rect x="100" y="122" width="300" height="200" rx="10" fill="#F1FAEE" stroke="#1D3557" stroke-width="2"/>
  <text x="250" y="140" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1D3557" text-anchor="middle">ZONE DE RÉSOLUTION</text>

  <!-- Grille 3x3 pour lancer de dés -->
  <line x1="200" y1="148" x2="200" y2="316" stroke="#A8DADC" stroke-width="1.5"/>
  <line x1="300" y1="148" x2="300" y2="316" stroke="#A8DADC" stroke-width="1.5"/>
  <line x1="100" y1="216" x2="400" y2="216" stroke="#A8DADC" stroke-width="1.5"/>
  <line x1="100" y1="264" x2="400" y2="264" stroke="#A8DADC" stroke-width="1.5"/>

  <!-- Cellules dés – labels -->
  <text x="150" y="186" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Dé 1</text>
  <text x="250" y="186" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Dé 2</text>
  <text x="350" y="186" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Dé 3</text>
  <text x="150" y="244" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Réserve</text>
  <text x="250" y="244" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Réserve</text>
  <text x="350" y="244" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Réserve</text>
  <text x="150" y="294" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Bouclier</text>
  <text x="250" y="294" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Bouclier</text>
  <text x="350" y="294" font-family="sans-serif" font-size="9" fill="#A8DADC" text-anchor="middle">Bouclier</text>

  <!-- Icône dé central décoratif -->
  <rect x="220" y="218" width="60" height="48" rx="8" fill="#1D3557" opacity="0.08"/>
  <rect x="226" y="224" width="48" height="36" rx="6" fill="none" stroke="#1D3557" stroke-width="1.5" opacity="0.3"/>

  <!-- ===================== PILE TUILES MENACE ===================== -->
  <rect x="20" y="122" width="70" height="100" rx="8" fill="#1D3557" stroke="#1D3557" stroke-width="2"/>
  <!-- Dos cartes empilées effet -->
  <rect x="24" y="130" width="60" height="86" rx="6" fill="#1D3557"/>
  <rect x="26" y="132" width="56" height="82" rx="5" fill="#A8DADC" opacity="0.15"/>
  <rect x="28" y="134" width="52" height="78" rx="5" fill="none" stroke="#A8DADC" stroke-width="1" opacity="0.5"/>
  <!-- Icône danger -->
  <polygon points="55,152 67,172 43,172" fill="#F4A261" stroke="#F1FAEE" stroke-width="1.5"/>
  <text x="55" y="169" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1D3557" text-anchor="middle">!</text>
  <text x="55" y="194" font-family="sans-serif" font-size="8" fill="#F1FAEE" text-anchor="middle">MENACE</text>
  <text x="55" y="205" font-family="sans-serif" font-size="8" fill="#A8DADC" text-anchor="middle">×15</text>
  <text x="55" y="218" font-family="sans-serif" font-size="8" fill="#F1FAEE" text-anchor="middle">↓ PIOCHER</text>

  <!-- ===================== PILE CARTES BOUCLIER ===================== -->
  <rect x="410" y="122" width="70" height="100" rx="8" fill="#457B9D" stroke="#1D3557" stroke-width="2"/>
  <rect x="414" y="130" width="60" height="86" rx="6" fill="#457B9D"/>
  <rect x="416" y="132" width="56" height="82" rx="5" fill="#F1FAEE" opacity="0.1"/>
  <rect x="418" y="134" width="52" height="78" rx="5" fill="none" stroke="#F1FAEE" stroke-width="1" opacity="0.5"/>
  <!-- Icône bouclier -->
  <path d="M445,152 L465,152 L465,168 Q465,178 455,183 Q445,178 445,168 Z" fill="#A8DADC" stroke="#F1FAEE" stroke-width="1.5"/>
  <text x="455" y="171" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1D3557" text-anchor="middle">✦</text>
  <text x="445" y="194" font-family="sans-serif" font-size="8" fill="#F1FAEE" text-anchor="middle">BOUCLIER</text>
  <text x="445" y="205" font-family="sans-serif" font-size="8" fill="#A8DADC" text-anchor="middle">×20</text>
  <text x="445" y="218" font-family="sans-serif" font-size="8" fill="#F1FAEE" text-anchor="middle">↓ PIOCHER</text>

  <!-- ===================== ZONE MENACE ACTIVE ===================== -->
  <rect x="20" y="232" width="70" height="90" rx="8" fill="#F4A261" stroke="#1D3557" stroke-width="2"/>
  <text x="55" y="248" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1D3557" text-anchor="middle">MENACE</text>
  <text x="55" y="258" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1D3557" text-anchor="middle">ACTIVE</text>
  <rect x="28" y="262" width="54" height="52" rx="5" fill="#F1FAEE" stroke="#1D3557" stroke-width="1.5"/>
  <text x="55" y="275" font-family="sans-serif" font-size="8" fill="#A8DADC" text-anchor="middle">Tuile</text>
  <text x="55" y="287" font-family="sans-serif" font-size="8" fill="#A8DADC" text-anchor="middle">retournée</text>
  <polygon points="55,298 63,310 47,310" fill="#E63946" stroke="#1D3557" stroke-width="1"/>
  <text x="55" y="308" font-family="sans-serif" font-size="7" font-weight="bold" fill="#F1FAEE" text-anchor="middle">!</text>

  <!-- ===================== ZONE DÉFAUSSE BOUCLIER ===================== -->
  <rect x="410" y="232" width="70" height="90" rx="8" fill="#A8DADC" stroke="#1D3557" stroke-width="2"/>
  <text x="445" y="248" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1D3557" text-anchor="middle">BOUCLIERS</text>
  <text x="445" y="258" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1D3557" text-anchor="middle">UTILISÉS</text>
  <rect x="418" y="262" width="54" height="52" rx="5" fill="#F1FAEE" stroke="#1D3557" stroke-width="1.5"/>
  <text x="445" y="285" font-family="sans-serif" font-size="8" fill="#A8DADC" text-anchor="middle">Défausse</text>
  <text x="445" y="298" font-family="sans-serif" font-size="20" fill="#A8DADC" text-anchor="middle" opacity="0.5">↺</text>

  <!-- ===================== PLATEAUX JOUEURS ===================== -->

  <!-- Joueur 1 – Rouge (bas gauche) -->
  <rect x="20" y="334" width="108" height="120" rx="8" fill="#E63946" stroke="#1D3557" stroke-width="2"/>
  <rect x="24" y="338" width="100" height="112" rx="6" fill="#F1FAEE"