<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <title>Pion Jauge de Crise</title>
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ombre portée -->
  <ellipse cx="25" cy="46" rx="11" ry="3" fill="#1D3557" fill-opacity="0.25"/>

  <!-- Corps principal du curseur : flèche pointant vers le bas -->
  <path d="M25 44 L13 20 Q12 16 16 14 L25 12 L34 14 Q38 16 37 20 Z"
        fill="url(#bodyGrad)" stroke="#1D3557" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Rectangle supérieur (poignée) -->
  <rect x="14" y="6" width="22" height="13" rx="4" ry="4"
        fill="url(#bodyGrad)" stroke="#1D3557" stroke-width="1.5"/>

  <!-- Reflet brillant sur la poignée -->
  <rect x="16" y="8" width="9" height="4" rx="2" ry="2"
        fill="url(#shineGrad)"/>

  <!-- Icône éclair (danger / crise) -->
  <path d="M27 10 L23 16 L26 16 L23 22 L29 15 L26 15 Z"
        fill="#F1FAEE" stroke="#1D3557" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Contour décoratif bas de la poignée -->
  <line x1="14" y1="17" x2="36" y2="17" stroke="#1D3557" stroke-width="0.8" stroke-opacity="0.4"/>
</svg>