<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <title>Plateau Joueur Vert - Dés du Destin</title>
  <!-- Background -->
  <rect width="400" height="400" fill="#F1FAEE" rx="12"/>
  <rect x="4" y="4" width="392" height="392" fill="none" stroke="#1D3557" stroke-width="3" rx="10"/>

  <!-- Header band -->
  <rect x="0" y="0" width="400" height="56" fill="#2A9D8F" rx="10"/>
  <rect x="0" y="44" width="400" height="12" fill="#2A9D8F"/>

  <!-- Player label -->
  <text x="200" y="36" font-family="serif" font-size="22" font-weight="bold" fill="#F1FAEE" text-anchor="middle" letter-spacing="2">JOUEUR VERT</text>

  <!-- Player icon (simple hexagon/shield) -->
  <polygon points="24,28 36,14 48,28 48,42 36,56 24,42" fill="#F1FAEE" opacity="0.3"/>
  <polygon points="24,28 36,14 48,28 48,42 36,56 24,42" fill="none" stroke="#F1FAEE" stroke-width="2"/>

  <!-- Section: Dés en réserve -->
  <rect x="12" y="68" width="376" height="140" fill="#A8DADC" rx="8" opacity="0.25"/>
  <rect x="12" y="68" width="376" height="140" fill="none" stroke="#1D3557" stroke-width="2" rx="8"/>
  <text x="200" y="88" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">DÉS EN RÉSERVE</text>

  <!-- Die slot 1 -->
  <rect x="36" y="98" width="80" height="80" fill="#F1FAEE" rx="10" stroke="#2A9D8F" stroke-width="2.5"/>
  <text x="76" y="146" font-family="serif" font-size="34" fill="#2A9D8F" text-anchor="middle" opacity="0.4">?</text>
  <text x="76" y="188" font-family="sans-serif" font-size="11" fill="#1D3557" text-anchor="middle">Dé 1</text>

  <!-- Die slot 2 -->
  <rect x="160" y="98" width="80" height="80" fill="#F1FAEE" rx="10" stroke="#2A9D8F" stroke-width="2.5"/>
  <text x="200" y="146" font-family="serif" font-size="34" fill="#2A9D8F" text-anchor="middle" opacity="0.4">?</text>
  <text x="200" y="188" font-family="sans-serif" font-size="11" fill="#1D3557" text-anchor="middle">Dé 2</text>

  <!-- Die slot 3 -->
  <rect x="284" y="98" width="80" height="80" fill="#F1FAEE" rx="10" stroke="#2A9D8F" stroke-width="2.5"/>
  <text x="324" y="146" font-family="serif" font-size="34" fill="#2A9D8F" text-anchor="middle" opacity="0.4">?</text>
  <text x="324" y="188" font-family="sans-serif" font-size="11" fill="#1D3557" text-anchor="middle">Dé 3</text>

  <!-- Section: Combinaisons -->
  <rect x="12" y="220" width="376" height="166" fill="#A8DADC" rx="8" opacity="0.18"/>
  <rect x="12" y="220" width="376" height="166" fill="none" stroke="#1D3557" stroke-width="2" rx="8"/>
  <text x="200" y="240" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">COMBINAISONS</text>

  <!-- Combo table header -->
  <rect x="20" y="246" width="364" height="22" fill="#2A9D8F" rx="4" opacity="0.7"/>
  <text x="120" y="261" font-family="sans-serif" font-size="11" font-weight="bold" fill="#F1FAEE" text-anchor="middle">COMBINAISON</text>
  <text x="310" y="261" font-family="sans-serif" font-size="11" font-weight="bold" fill="#F1FAEE" text-anchor="middle">EFFET</text>
  <line x1="216" y1="246" x2="216" y2="268" stroke="#F1FAEE" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="20" y="268" width="364" height="20" fill="#F1FAEE" rx="2"/>
  <text x="120" y="282" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Paire</text>
  <text x="310" y="282" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Crise -1</text>
  <line x1="216" y1="268" x2="216" y2="288" stroke="#1D3557" stroke-width="0.5"/>

  <!-- Row 2 -->
  <rect x="20" y="288" width="364" height="20" fill="#A8DADC" rx="2" opacity="0.4"/>
  <text x="120" y="302" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Double Paire</text>
  <text x="310" y="302" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Crise -2</text>
  <line x1="216" y1="288" x2="216" y2="308" stroke="#1D3557" stroke-width="0.5"/>

  <!-- Row 3 -->
  <rect x="20" y="308" width="364" height="20" fill="#F1FAEE" rx="2"/>
  <text x="120" y="322" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Brelan</text>
  <text x="310" y="322" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Annuler Menace</text>
  <line x1="216" y1="308" x2="216" y2="328" stroke="#1D3557" stroke-width="0.5"/>

  <!-- Row 4 -->
  <rect x="20" y="328" width="364" height="20" fill="#A8DADC" rx="2" opacity="0.4"/>
  <text x="120" y="342" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Suite (3 consécutifs)</text>
  <text x="310" y="342" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">+1 carte Bouclier</text>
  <line x1="216" y1="328" x2="216" y2="348" stroke="#1D3557" stroke-width="0.5"/>

  <!-- Row 5 -->
  <rect x="20" y="348" width="364" height="20" fill="#F1FAEE" rx="2"/>
  <text x="120" y="362" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Tous différents</text>
  <text x="310" y="362" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle">Rejouer 1 dé</text>
  <line x1="216" y1="348" x2="216" y2="368" stroke="#1D3557" stroke-width="0.5"/>

  <!-- Outer combo box border lines -->
  <line x1="20" y1="268" x2="384" y2="268" stroke="#1D3557" stroke-width="0.8"/>
  <line x1="20" y1="288" x2="384" y2="288" stroke="#1D3557" stroke-width="0.5"/>
  <line x1="20" y1="308" x2="384" y2="308" stroke="#1D3557" stroke-width="0.5"/>
  <line x1="20" y1="328" x2="384" y2="328" stroke="#1D3557" stroke-width="0.5"/>
  <line x1="20" y1="348" x2="384" y2="348" stroke="#1D3557" stroke-width="0.5"/>

  <!-- Bottom accent bar -->
  <rect x="12" y="374" width="376" height="18" fill="#F4A261" rx="6" opacity="0.85"/>
  <text x="200" y="387" font-family="sans-serif" font-size="10" fill="#1D3557" text-anchor="middle" font-weight="bold">DÉS DU DESTIN</text>
</svg>