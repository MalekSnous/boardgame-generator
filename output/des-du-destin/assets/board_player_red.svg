<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <title>Plateau Joueur Rouge - Dés du Destin</title>
  <!-- Fond principal -->
  <rect width="400" height="400" rx="12" ry="12" fill="#F1FAEE" stroke="#1D3557" stroke-width="3"/>
  <!-- Bandeau titre joueur -->
  <rect x="0" y="0" width="400" height="52" rx="12" ry="12" fill="#E63946"/>
  <rect x="0" y="30" width="400" height="22" fill="#E63946"/>
  <text x="200" y="34" font-family="serif" font-size="20" font-weight="bold" fill="#F1FAEE" text-anchor="middle" dominant-baseline="middle">JOUEUR 1 — ROUGE</text>

  <!-- Section réserve de dés -->
  <rect x="12" y="62" width="376" height="120" rx="8" ry="8" fill="#A8DADC" stroke="#1D3557" stroke-width="2"/>
  <text x="200" y="82" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">Réserve de dés</text>

  <!-- Dé 1 -->
  <rect x="36" y="92" width="70" height="70" rx="10" ry="10" fill="#F1FAEE" stroke="#E63946" stroke-width="3"/>
  <circle cx="71" cy="127" r="7" fill="#E63946"/>
  <text x="71" y="174" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Dé 1</text>

  <!-- Dé 2 -->
  <rect x="165" y="92" width="70" height="70" rx="10" ry="10" fill="#F1FAEE" stroke="#E63946" stroke-width="3"/>
  <circle cx="185" cy="112" r="6" fill="#E63946"/>
  <circle cx="215" cy="142" r="6" fill="#E63946"/>
  <text x="200" y="174" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Dé 2</text>

  <!-- Dé 3 -->
  <rect x="294" y="92" width="70" height="70" rx="10" ry="10" fill="#F1FAEE" stroke="#E63946" stroke-width="3"/>
  <circle cx="314" cy="112" r="5" fill="#E63946"/>
  <circle cx="329" cy="127" r="5" fill="#E63946"/>
  <circle cx="344" cy="142" r="5" fill="#E63946"/>
  <text x="329" y="174" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Dé 3</text>

  <!-- Section combinaisons -->
  <rect x="12" y="192" width="376" height="188" rx="8" ry="8" fill="#F1FAEE" stroke="#1D3557" stroke-width="2"/>
  <text x="200" y="212" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">Combinaisons</text>

  <!-- Ligne séparatrice -->
  <line x1="24" y1="220" x2="376" y2="220" stroke="#1D3557" stroke-width="1.5"/>

  <!-- En-têtes colonnes -->
  <text x="100" y="235" font-family="serif" font-size="11" font-weight="bold" fill="#1D3557" text-anchor="middle">Combinaison</text>
  <text x="260" y="235" font-family="serif" font-size="11" font-weight="bold" fill="#1D3557" text-anchor="middle">Effet</text>
  <line x1="24" y1="240" x2="376" y2="240" stroke="#A8DADC" stroke-width="1"/>
  <line x1="192" y1="220" x2="192" y2="374" stroke="#A8DADC" stroke-width="1"/>

  <!-- Rangée 1 -->
  <rect x="14" y="242" width="374" height="22" rx="2" fill="#A8DADC" fill-opacity="0.3"/>
  <text x="100" y="257" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Paire</text>
  <text x="260" y="257" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">-1 Crise</text>

  <!-- Rangée 2 -->
  <text x="100" y="279" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Brelan</text>
  <text x="260" y="279" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">-2 Crise</text>

  <!-- Rangée 3 -->
  <rect x="14" y="284" width="374" height="22" rx="2" fill="#A8DADC" fill-opacity="0.3"/>
  <text x="100" y="299" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Suite (3 dés)</text>
  <text x="260" y="299" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Rejouer 1 dé</text>

  <!-- Rangée 4 -->
  <text x="100" y="321" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Tout différent</text>
  <text x="260" y="321" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">+1 Bouclier</text>

  <!-- Rangée 5 -->
  <rect x="14" y="326" width="374" height="22" rx="2" fill="#A8DADC" fill-opacity="0.3"/>
  <text x="100" y="341" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Maximum (6,6,6)</text>
  <text x="260" y="341" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Bloquer Catastrophe</text>

  <!-- Rangée 6 -->
  <text x="100" y="363" font-family="serif" font-size="11" fill="#1D3557" text-anchor="middle">Minimum (1,1,1)</text>
  <text x="260" y="363" font-family="serif" font-size="11" fill="#E63946" text-anchor="middle">+3 Crise !</text>

  <!-- Ligne séparatrice bas tableau -->
  <line x1="24" y1="368" x2="376" y2="368" stroke="#1D3557" stroke-width="1"/>

  <!-- Pied de plateau -->
  <rect x="0" y="378" width="400" height="22" rx="0" ry="0" fill="#E63946" fill-opacity="0.15"/>
  <rect x="0" y="388" width="400" height="12" rx="0" ry="12" fill="#E63946" fill-opacity="0.15"/>
  <text x="200" y="393" font-family="serif" font-size="10" fill="#1D3557" text-anchor="middle">Dés du Destin</text>

  <!-- Icône dé décorative coin bas-droit -->
  <rect x="358" y="200" width="28" height="28" rx="5" ry="5" fill="#E63946" stroke="#1D3557" stroke-width="1.5"/>
  <circle cx="366" cy="208" r="3" fill="#F1FAEE"/>
  <circle cx="378" cy="220" r="3" fill="#F1FAEE"/>
  <circle cx="366" cy="220" r="3" fill="#F1FAEE"/>
</svg>