<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <title>Dés du Destin – Jauge de Crise</title>
  <!-- Background -->
  <rect width="400" height="400" fill="#F1FAEE" rx="16"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="384" fill="none" stroke="#1D3557" stroke-width="3" rx="13"/>

  <!-- Title -->
  <rect x="30" y="20" width="340" height="44" fill="#1D3557" rx="8"/>
  <text x="200" y="49" font-family="serif" font-size="22" font-weight="bold" fill="#F1FAEE" text-anchor="middle">JAUGE DE CRISE</text>

  <!-- Gauge track background -->
  <rect x="60" y="88" width="280" height="220" fill="#A8DADC" rx="10" stroke="#1D3557" stroke-width="2.5"/>

  <!-- Gradient fill segments 0-10, bottom to top -->
  <!-- Segment 0 (bottom, safe) -->
  <rect x="62" y="286" width="276" height="20" fill="#2A9D8F" rx="0"/>
  <!-- Segment 1 -->
  <rect x="62" y="264" width="276" height="20" fill="#457B9D"/>
  <!-- Segment 2 -->
  <rect x="62" y="242" width="276" height="20" fill="#457B9D"/>
  <!-- Segment 3 -->
  <rect x="62" y="220" width="276" height="20" fill="#E9C46A"/>
  <!-- Segment 4 -->
  <rect x="62" y="198" width="276" height="20" fill="#E9C46A"/>
  <!-- Segment 5 -->
  <rect x="62" y="176" width="276" height="20" fill="#F4A261"/>
  <!-- Segment 6 -->
  <rect x="62" y="154" width="276" height="20" fill="#F4A261"/>
  <!-- Segment 7 -->
  <rect x="62" y="132" width="276" height="20" fill="#E63946"/>
  <!-- Segment 8 -->
  <rect x="62" y="110" width="276" height="20" fill="#E63946"/>
  <!-- Segment 9 -->
  <rect x="62" y="88" width="276" height="22" fill="#E63946" rx="0"/>

  <!-- Grid lines between segments -->
  <line x1="60" y1="306" x2="340" y2="306" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="286" x2="340" y2="286" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="264" x2="340" y2="264" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="242" x2="340" y2="242" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="220" x2="340" y2="220" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="198" x2="340" y2="198" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="176" x2="340" y2="176" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="154" x2="340" y2="154" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="132" x2="340" y2="132" stroke="#1D3557" stroke-width="1.5"/>
  <line x1="60" y1="110" x2="340" y2="110" stroke="#1D3557" stroke-width="1.5"/>

  <!-- Level numbers left -->
  <text x="48" y="302" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">0</text>
  <text x="48" y="280" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">1</text>
  <text x="48" y="258" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">2</text>
  <text x="48" y="236" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">3</text>
  <text x="48" y="214" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">4</text>
  <text x="48" y="192" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">5</text>
  <text x="48" y="170" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">6</text>
  <text x="48" y="148" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">7</text>
  <text x="48" y="126" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">8</text>
  <text x="48" y="104" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">9</text>
  <text x="48" y="88" font-family="serif" font-size="14" font-weight="bold" fill="#1D3557" text-anchor="middle">10</text>

  <!-- Zone labels right -->
  <text x="352" y="293" font-family="sans-serif" font-size="10" fill="#2A9D8F" text-anchor="start" font-weight="bold">CALME</text>
  <text x="352" y="253" font-family="sans-serif" font-size="10" fill="#457B9D" text-anchor="start" font-weight="bold">STABLE</text>
  <text x="352" y="213" font-family="sans-serif" font-size="10" fill="#E9C46A" text-anchor="start" font-weight="bold">TENSION</text>
  <text x="352" y="173" font-family="sans-serif" font-size="10" fill="#F4A261" text-anchor="start" font-weight="bold">ALERTE</text>
  <text x="352" y="123" font-family="sans-serif" font-size="10" fill="#E63946" text-anchor="start" font-weight="bold">CRISE!</text>

  <!-- Cursor / pion jauge at level 4 (y=198+10=208 center) -->
  <polygon points="340,208 360,200 360,216" fill="#F4A261" stroke="#1D3557" stroke-width="2"/>
  <circle cx="360" cy="208" r="8" fill="#F4A261" stroke="#1D3557" stroke-width="2"/>
  <text x="360" y="212" font-family="serif" font-size="9" font-weight="bold" fill="#1D3557" text-anchor="middle">4</text>

  <!-- Catastrophe zone top indicator -->
  <rect x="62" y="88" width="276" height="22" fill="none" stroke="#E63946" stroke-width="2.5" rx="0"/>
  <text x="200" y="103" font-family="sans-serif" font-size="11" font-weight="bold" fill="#F1FAEE" text-anchor="middle">☠ CATASTROPHE</text>

  <!-- Bottom legend -->
  <rect x="30" y="326" width="340" height="54" fill="#1D3557" rx="8"/>
  <!-- Safe zone dot -->
  <circle cx="56" cy="345" r="7" fill="#2A9D8F"/>
  <text x="68" y="349" font-family="sans-serif" font-size="10" fill="#F1FAEE">0-2 : Calme</text>
  <!-- Tension dot -->
  <circle cx="56" cy="364" r="7" fill="#E9C46A"/>
  <text x="68" y="368" font-family="sans-serif" font-size="10" fill="#F1FAEE">3-4 : Tension</text>
  <!-- Alert dot -->
  <circle cx="156" cy="345" r="7" fill="#F4A261"/>
  <text x="168" y="349" font-family="sans-serif" font-size="10" fill="#F1FAEE">5-6 : Alerte</text>
  <!-- Crisis dot -->
  <circle cx="156" cy="364" r="7" fill="#E63946"/>
  <text x="168" y="368" font-family="sans-serif" font-size="10" fill="#F1FAEE">7-9 : Crise</text>
  <!-- Catastrophe -->
  <circle cx="256" cy="355" r="7" fill="#E63946" stroke="#F4A261" stroke-width="2"/>
  <text x="268" y="359" font-family="sans-serif" font-size="10" fill="#F4A261" font-weight="bold">10 : Catastrophe!</text>
</svg>