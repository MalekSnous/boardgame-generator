<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <title>Morpion Duel - Match Nul</title>
  <rect width="400" height="120" rx="12" ry="12" fill="#1D3557"/>
  <rect x="4" y="4" width="392" height="112" rx="10" ry="10" fill="#F1FAEE"/>
  <rect x="8" y="8" width="384" height="104" rx="8" ry="8" fill="#A8DADC" opacity="0.25"/>

  <!-- Symbole X gauche -->
  <g transform="translate(30, 35)">
    <line x1="0" y1="0" x2="40" y2="40" stroke="#E63946" stroke-width="7" stroke-linecap="round"/>
    <line x1="40" y1="0" x2="0" y2="40" stroke="#E63946" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Symbole O droit -->
  <g transform="translate(310, 55)">
    <circle cx="20" cy="0" r="20" fill="none" stroke="#457B9D" stroke-width="7"/>
  </g>

  <!-- Bandeau central -->
  <rect x="90" y="22" width="220" height="76" rx="8" ry="8" fill="#F4A261"/>
  <rect x="94" y="26" width="212" height="68" rx="6" ry="6" fill="#1D3557"/>

  <!-- Texte MATCH NUL -->
  <text x="200" y="58" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#F4A261" text-anchor="middle" letter-spacing="3">MATCH NUL</text>

  <!-- Sous-titre -->
  <text x="200" y="82" font-family="Georgia, serif" font-size="13" fill="#A8DADC" text-anchor="middle" letter-spacing="1">Aucun gagnant cette fois</text>

  <!-- Petites étoiles décoratives -->
  <text x="108" y="58" font-family="serif" font-size="14" fill="#F4A261" text-anchor="middle">★</text>
  <text x="292" y="58" font-family="serif" font-size="14" fill="#F4A261" text-anchor="middle">★</text>
</svg>