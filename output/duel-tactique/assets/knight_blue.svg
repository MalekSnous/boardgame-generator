<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <title>Cavalier Bleu</title>
  <circle cx="30" cy="30" r="28" fill="#457B9D" stroke="#1D3557" stroke-width="2.5"/>
  <circle cx="30" cy="30" r="22" fill="#457B9D" stroke="#A8DADC" stroke-width="1.2"/>
  <!-- Horse head silhouette simplified -->
  <rect x="24" y="12" width="10" height="14" rx="3" ry="3" fill="#F1FAEE"/>
  <rect x="27" y="22" width="6" height="5" rx="1" fill="#F1FAEE"/>
