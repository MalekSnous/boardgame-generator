<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <title>Cavalier - Duel Tactique</title>
  <!-- Base/socle -->
  <ellipse cx="30" cy="52" rx="18" ry="5" fill="#1D3557" opacity="0.3"/>
  <!-- Corps du cavalier -->
  <rect x="18" y="38" width="24" height="14" rx="4" ry="4" fill="#E63946"/>
  <!-- Torse -->
  <rect x="21" y="26" width="18" height="16" rx="3" ry="3" fill="#E63946"/>
  <!-- Tête du cheval stylisée -->
  <polygon points="30,8 38,14 40,22 36,24 28,22 22,18 24,10" fill="#E63946"/>
  <!-- Museau cheval -->
  <ellipse cx="39" cy="20" rx="5" ry="4" fill="#E63946"/>
  <!-- Oeil cheval -->
  <circle cx="36" cy="15" r="2" fill="#1D3557"/>
  <circle cx="36" cy="15" r="1" fill="#F1FAEE"/>
  <!-- Narine cheval -->
  <ellipse cx="42" cy="22" rx="2" ry="1.2" fill="#1D3557" opacity="0.5"/>
  <!-- Crinière -->
  <path d="M30,8 Q26,10 24,14 Q22,18 22,18" stroke="#1D3557" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M30,8 Q27,12 26,16" stroke="#1D3557" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Lance / épée du cavalier -->
  <line x1="14" y1="12" x2="26" y2="30" stroke="#F4A261" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="14,12 11,8 18,13" fill="#F4A261"/>
  <!-- Bouclier -->
  <path d="M34,28 Q34,22 37,20 Q40,22 40,28 Q40,33 37,35 Q34,33 34,28Z" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <line x1="37" y1="20" x2="37" y2="35" stroke="#1D3557" stroke-width="0.8"/>
  <line x1="34" y1="28" x2="40" y2="28" stroke="#1D3557" stroke-width="0.8"/>
  <!-- Valeur de combat -->
  <circle cx="10" cy="50" r="8" fill="#1D3557"/>
  <text x="10" y="54" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#F4A261">2</text>
  <!-- Jambes / étriers -->
  <line x1="22" y1="50" x2="20" y2="56" stroke="#1D3557" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="40" y2="56" stroke="#1D3557" stroke-width="2" stroke-linecap="round"/>
  <line x1="17" y1="56" x2="23" y2="56" stroke="#1D3557" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="56" x2="43" y2="56" stroke="#1D3557" stroke-width="2" stroke-linecap="round"/>
</svg>