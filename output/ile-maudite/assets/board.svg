<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <title>Île Maudite — Plateau de jeu</title>
  <!-- Fond général -->
  <rect width="500" height="500" fill="#F1FAEE"/>
  <!-- Titre -->
  <rect x="0" y="0" width="500" height="32" fill="#1D3557"/>
  <text x="250" y="22" font-family="serif" font-size="16" font-weight="bold" fill="#F1FAEE" text-anchor="middle">ÎLE MAUDITE</text>

  <!-- Grille 7×7 : cases de 52×52 avec marges -->
  <!-- Origine grille : x=26, y=40 -->
  <!-- Légende couleurs terrain -->
