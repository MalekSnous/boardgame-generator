  <text x="208" y="65" font-family="serif" font-size="18" text-anchor="middle" fill="#F1FAEE" font-weight="bold">VOL</text>
  <text x="208" y="83" font-family="serif" font-size="18" text-anchor="middle" fill="#F1FAEE" font-weight="bold">CAN</text>
  <!-- croix blocage -->
  <line x1="187" y1="45" x2="230" y2="88" stroke="#1D3557" stroke-width="3"/>
  <line x1="230" y1="45" x2="187" y2="88" stroke="#1D3557" stroke-width="3"/>

