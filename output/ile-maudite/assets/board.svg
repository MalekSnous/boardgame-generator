  <!-- Définitions des cases (row=0..6 top, col=0..6 left) -->
  <!-- Layout:
    Plage = col=3, row=6 (centre bas) — toujours révélée
    Volcan = col=3, row=0 (centre haut) — bloqué
    Reste = brouillard (face cachée) avec icônes de type suggérées
  -->

  <!-- Fond de la grille -->
  <rect x="26" y="40" width="364" height="364" fill="#A8DADC" rx="4"/>

  <!-- Cases -->
  <!-- Row 0 -->
  <!-- (0,0) Forêt -->
  <rect x="27" y="41" width="51" height="51" fill="#2A9D8F" rx="3"/>
  <text x="52" y="73" font-family="serif" font-size="22" text-anchor="middle">🌲</text>
  <rect x="27" y="41" width="51" height="51" fill="#1D3557" fill-opacity="0.18" rx="3"/>

  <!-- (0,1) Plaine -->
  <rect x="79" y="41" width="51" height="51" fill="#E9C46A" rx="3"/>
