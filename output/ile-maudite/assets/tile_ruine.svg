<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <title>Tuile Ruine</title>
  <rect width="60" height="60" rx="4" ry="4" fill="#F1FAEE" stroke="#1D3557" stroke-width="2"/>
  <rect x="4" y="4" width="52" height="52" rx="2" ry="2" fill="#A8DADC" opacity="0.3"/>
  <!-- Ground -->
  <rect x="6" y="42" width="48" height="4" rx="1" fill="#1D3557" opacity="0.2"/>
  <!-- Left broken wall -->
  <rect x="10" y="22" width="8" height="22" rx="1" fill="#A8DADC" stroke="#1D3557" stroke-width="1.2"/>
  <polygon points="10,22 18,22 16,14 12,16" fill="#A8DADC" stroke="#1D3557" stroke-width="1.2"/>
  <!-- Right broken wall -->
  <rect x="28" y="28" width="8" height="16" rx="1" fill="#A8DADC" stroke="#1D3557" stroke-width="1.2"/>
  <polygon points="28,28 36,28 34,20 30,22" fill="#A8DADC" stroke="#1D3557" stroke-width="1.2"/>
  <!-- Far right short wall -->
  <rect x="42" y="32" width="7" height="12" rx="1" fill="#A8DADC" stroke="#1D3557" stroke-width="1.2"/>
  <polygon points="42,32 49,32 48,26 43,27" fill="#A8DADC" stroke="#1D3557" stroke-width="1.2"/>
  <!-- Rubble stones -->
  <ellipse cx="22" cy="43" rx="4" ry="2.5" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <ellipse cx="32" cy="44" rx="3" ry="2" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <ellipse cx="16" cy="45" rx="2.5" ry="1.5" fill="#A8DADC" stroke="#1D3557" stroke-width="0.8"/>
  <ellipse cx="39" cy="44" rx="2" ry="1.5" fill="#A8DADC" stroke="#1D3557" stroke-width="0.8"/>
  <!-- Metal icon: small gear-like shape -->
  <circle cx="30" cy="12" r="5" fill="none" stroke="#1D3557" stroke-width="1.5"/>
  <circle cx="30" cy="12" r="2.5" fill="#1D3557"/>
  <line x1="30" y1="6" x2="30" y2="8" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="16" x2="30" y2="18" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="12" x2="26" y2="12" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="12" x2="36" y2="12" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25.8" y1="7.8" x2="27.1" y2="9.1" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32.9" y1="14.9" x2="34.2" y2="16.2" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34.2" y1="7.8" x2="32.9" y2="9.1" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27.1" y1="14.9" x2="25.8" y2="16.2" stroke="#1D3557" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="30" y="57" font-family="sans-serif" font-size="6" font-weight="bold" fill="#1D3557" text-anchor="middle">RUINE</text>
</svg>