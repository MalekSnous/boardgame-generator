<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 90">
  <title>Carte Événement – Accalmie</title>
  <!-- Fond de carte -->
  <rect width="60" height="90" rx="5" ry="5" fill="#F1FAEE" stroke="#1D3557" stroke-width="2"/>
  <!-- En-tête -->
  <rect x="2" y="2" width="56" height="18" rx="4" ry="4" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <!-- Titre -->
  <text x="30" y="14" font-family="serif" font-size="7" font-weight="bold" fill="#1D3557" text-anchor="middle">ACCALMIE</text>
  <!-- Zone illustration centrale -->
  <rect x="5" y="23" width="50" height="38" rx="3" ry="3" fill="#A8DADC" stroke="#1D3557" stroke-width="1"/>
  <!-- Soleil -->
  <circle cx="30" cy="42" r="9" fill="#F4A261" stroke="#1D3557" stroke-width="1"/>
  <!-- Rayons soleil -->
  <line x1="30" y1="28" x2="30" y2="25" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="56" x2="30" y2="59" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="42" x2="13" y2="42" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="42" x2="47" y2="42" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.8" y1="31.8" x2="17.7" y2="29.7" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40.2" y1="52.2" x2="42.3" y2="54.3" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40.2" y1="31.8" x2="42.3" y2="29.7" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.8" y1="52.2" x2="17.7" y2="54.3" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nuages légers -->
  <ellipse cx="15" cy="35" rx="5" ry="3" fill="#F1FAEE" opacity="0.85"/>
  <ellipse cx="18" cy="33.5" rx="4" ry="2.5" fill="#F1FAEE" opacity="0.85"/>
  <ellipse cx="45" cy="37" rx="5" ry="3" fill="#F1FAEE" opacity="0.85"/>
  <ellipse cx="42" cy="35.5" rx="4" ry="2.5" fill="#F1FAEE" opacity="0.85"/>
  <!-- Mer calme -->
  <path d="M7 56 Q15 53 22 56 Q29 59 37 56 Q44 53 53 56" fill="none" stroke="#457B9D" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M7 59 Q15 56 22 59 Q29 62 37 59 Q44 56 53 59" fill="none" stroke="#457B9D" stroke-width="1" stroke-linecap="round"/>
  <!-- Séparateur -->
  <line x1="5" y1="64" x2="55" y2="64" stroke="#1D3557" stroke-width="0.8"/>
  <!-- Texte effet -->
  <text x="30" y="73" font-family="serif" font-size="6" fill="#1D3557" text-anchor="middle">Annulez le prochain</text>
  <text x="30" y="81" font-family="serif" font-size="6" fill="#1D3557" text-anchor="middle">événement négatif</text>
  <!-- Badge quantité -->
  <circle cx="52" cy="8" r="5" fill="#F4A261" stroke="#1D3557" stroke-width="1"/>
  <text x="52" y="11" font-family="serif" font-size="6" font-weight="bold" fill="#1D3557" text-anchor="middle">6</text>
</svg>