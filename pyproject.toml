[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — handled case-by-case
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
exclude = ["output/", "tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.coverage.run]
source = ["src"]
omit = ["src/agents/*.py"]  # agents make LLM calls — excluded from coverage target
